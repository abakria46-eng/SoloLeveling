name: Build SoloLeveling APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل المشروع
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: تثبيت الأدوات
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: بناء APK
        run: |
          buildozer android debug

      - name: حفظ APK
        uses: actions/upload-artifact@v4
        with:
          name: SoloLeveling-apk
          path: bin/*.apk
